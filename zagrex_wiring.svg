<svg viewBox="0 0 1100 780" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace" font-size="11">

  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#111128"/>
    </linearGradient>
    <linearGradient id="espGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e4e"/>
      <stop offset="100%" stop-color="#2a2a6e"/>
    </linearGradient>
    <linearGradient id="btsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#3a1500"/>
    </linearGradient>
    <linearGradient id="batGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001a00"/>
      <stop offset="100%" stop-color="#003300"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1100" height="780" fill="url(#bg)"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="1100" height="46" fill="#0a0a22"/>
  <text x="550" y="16" fill="#4466ff" font-size="9" text-anchor="middle" letter-spacing="4">THE AMERICAN UNIVERSITY OF KURDISTAN  •  ETE DEPARTMENT  •  FALL 2025</text>
  <text x="550" y="36" fill="#ffffff" font-size="18" font-weight="bold" text-anchor="middle" filter="url(#glow)" letter-spacing="2">ZAGREX  —  ESP32 + BTS7960  WIRING DIAGRAM</text>

  <!-- ═══════════════════════════════════
       ESP32 WROOM  (center)
  ══════════════════════════════════════ -->
  <rect x="420" y="240" width="160" height="260" rx="8" fill="url(#espGrad)" stroke="#5577ff" stroke-width="2.5" filter="url(#glow)"/>
  <text x="500" y="262" fill="#aabbff" font-size="11" font-weight="bold" text-anchor="middle">ESP32 WROOM</text>
  <line x1="430" y1="268" x2="570" y2="268" stroke="#5577ff" stroke-width="0.8" opacity="0.5"/>

  <!-- Left-side pin labels -->
  <text x="428" y="286" fill="#88ff88" font-size="9" text-anchor="start">GPIO25  (L_RPWM)</text>
  <text x="428" y="302" fill="#88ff88" font-size="9" text-anchor="start">GPIO26  (L_LPWM)</text>
  <text x="428" y="318" fill="#88ff88" font-size="9" text-anchor="start">GPIO27  (L_R_EN)</text>
  <text x="428" y="334" fill="#88ff88" font-size="9" text-anchor="start">GPIO14  (L_L_EN)</text>
  <text x="428" y="358" fill="#ff8844" font-size="9" text-anchor="start">GPIO32  (R_RPWM)</text>
  <text x="428" y="374" fill="#ff8844" font-size="9" text-anchor="start">GPIO33  (R_LPWM)</text>
  <text x="428" y="390" fill="#ff8844" font-size="9" text-anchor="start">GPIO18  (R_R_EN)</text>
  <text x="428" y="406" fill="#ff8844" font-size="9" text-anchor="start">GPIO19  (R_L_EN)</text>
  <text x="428" y="430" fill="#ffdd44" font-size="9" text-anchor="start">VIN  (5V from Buck)</text>
  <text x="428" y="446" fill="#6688ff" font-size="9" text-anchor="start">GND</text>
  <text x="428" y="462" fill="#44ddff" font-size="9" text-anchor="start">GPIO2  (Status LED)</text>
  <text x="428" y="486" fill="#ffffff" font-size="8" text-anchor="start">BT Name: "ZAGREX"</text>

  <!-- ═══════════════════════════════════
       BTS7960 Driver A  —  LEFT SIDE
  ══════════════════════════════════════ -->
  <rect x="70" y="190" width="180" height="195" rx="8" fill="url(#btsGrad)" stroke="#ff6622" stroke-width="2.5"/>
  <text x="160" y="210" fill="#ff8844" font-size="11" font-weight="bold" text-anchor="middle">BTS7960  —  Driver A</text>
  <text x="160" y="224" fill="#ffaa66" font-size="9" text-anchor="middle">LEFT Motors  (43A)</text>
  <line x1="80" y1="230" x2="240" y2="230" stroke="#ff6622" stroke-width="0.8" opacity="0.5"/>

  <text x="82" y="248" fill="#ccffcc" font-size="9">RPWM ← GPIO25</text>
  <text x="82" y="264" fill="#ccffcc" font-size="9">LPWM ← GPIO26</text>
  <text x="82" y="280" fill="#ccffcc" font-size="9">R_EN ← GPIO27</text>
  <text x="82" y="296" fill="#ccffcc" font-size="9">L_EN ← GPIO14</text>
  <text x="82" y="316" fill="#ff5555" font-size="9">VCC  ← 11.1V LiPo</text>
  <text x="82" y="332" fill="#6688ff" font-size="9">GND  ← Common GND</text>
  <text x="82" y="352" fill="#ffdd55" font-size="9">OUT+ → Motor L+</text>
  <text x="82" y="368" fill="#ffdd55" font-size="9">OUT− → Motor L−</text>

  <!-- wires ESP32 → Driver A -->
  <line x1="420" y1="283" x2="250" y2="246" stroke="#88ff88" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="420" y1="299" x2="250" y2="262" stroke="#88ff88" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="420" y1="315" x2="250" y2="278" stroke="#44ff88" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="420" y1="331" x2="250" y2="294" stroke="#44ff88" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- ═══════════════════════════════════
       BTS7960 Driver B  —  RIGHT SIDE
  ══════════════════════════════════════ -->
  <rect x="750" y="190" width="185" height="195" rx="8" fill="url(#btsGrad)" stroke="#ff4422" stroke-width="2.5"/>
  <text x="843" y="210" fill="#ff8844" font-size="11" font-weight="bold" text-anchor="middle">BTS7960  —  Driver B</text>
  <text x="843" y="224" fill="#ffaa66" font-size="9" text-anchor="middle">RIGHT Motors  (43A)</text>
  <line x1="760" y1="230" x2="925" y2="230" stroke="#ff4422" stroke-width="0.8" opacity="0.5"/>

  <text x="762" y="248" fill="#ffccaa" font-size="9">RPWM ← GPIO32</text>
  <text x="762" y="264" fill="#ffccaa" font-size="9">LPWM ← GPIO33</text>
  <text x="762" y="280" fill="#ffccaa" font-size="9">R_EN ← GPIO18</text>
  <text x="762" y="296" fill="#ffccaa" font-size="9">L_EN ← GPIO19</text>
  <text x="762" y="316" fill="#ff5555" font-size="9">VCC  ← 11.1V LiPo</text>
  <text x="762" y="332" fill="#6688ff" font-size="9">GND  ← Common GND</text>
  <text x="762" y="352" fill="#ffdd55" font-size="9">OUT+ → Motor R+</text>
  <text x="762" y="368" fill="#ffdd55" font-size="9">OUT− → Motor R−</text>

  <!-- wires ESP32 → Driver B -->
  <line x1="580" y1="355" x2="750" y2="246" stroke="#ffaa66" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="580" y1="371" x2="750" y2="262" stroke="#ffaa66" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="580" y1="387" x2="750" y2="278" stroke="#ffcc88" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="580" y1="403" x2="750" y2="294" stroke="#ffcc88" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- ═══════════════════════════════════
       DC MOTORS  — LEFT PAIR
  ══════════════════════════════════════ -->
  <!-- Front Left -->
  <rect x="20" y="90" width="110" height="55" rx="6" fill="#1a1000" stroke="#ffaa00" stroke-width="2"/>
  <text x="75" y="112" fill="#ffcc44" font-size="10" font-weight="bold" text-anchor="middle">Motor 1</text>
  <text x="75" y="127" fill="#ffaa44" font-size="8" text-anchor="middle">Front-Left</text>
  <text x="75" y="140" fill="#888888" font-size="7" text-anchor="middle">JGB37-545 12V</text>

  <!-- Rear Left -->
  <rect x="20" y="420" width="110" height="55" rx="6" fill="#1a1000" stroke="#ffaa00" stroke-width="2"/>
  <text x="75" y="442" fill="#ffcc44" font-size="10" font-weight="bold" text-anchor="middle">Motor 2</text>
  <text x="75" y="457" fill="#ffaa44" font-size="8" text-anchor="middle">Rear-Left</text>
  <text x="75" y="470" fill="#888888" font-size="7" text-anchor="middle">JGB37-545 12V</text>

  <!-- Motor wires → Driver A -->
  <line x1="130" y1="118" x2="160" y2="350" stroke="#ffaa00" stroke-width="2"/>
  <line x1="130" y1="447" x2="160" y2="366" stroke="#ffaa00" stroke-width="2"/>

  <!-- ═══════════════════════════════════
       DC MOTORS  — RIGHT PAIR
  ══════════════════════════════════════ -->
  <!-- Front Right -->
  <rect x="960" y="90" width="110" height="55" rx="6" fill="#1a0000" stroke="#ff4400" stroke-width="2"/>
  <text x="1015" y="112" fill="#ff8866" font-size="10" font-weight="bold" text-anchor="middle">Motor 3</text>
  <text x="1015" y="127" fill="#ff6644" font-size="8" text-anchor="middle">Front-Right</text>
  <text x="1015" y="140" fill="#888888" font-size="7" text-anchor="middle">JGB37-545 12V</text>

  <!-- Rear Right -->
  <rect x="960" y="420" width="110" height="55" rx="6" fill="#1a0000" stroke="#ff4400" stroke-width="2"/>
  <text x="1015" y="442" fill="#ff8866" font-size="10" font-weight="bold" text-anchor="middle">Motor 4</text>
  <text x="1015" y="457" fill="#ff6644" font-size="8" text-anchor="middle">Rear-Right</text>
  <text x="1015" y="470" fill="#888888" font-size="7" text-anchor="middle">JGB37-545 12V</text>

  <!-- Motor wires → Driver B -->
  <line x1="960" y1="118" x2="843" y2="350" stroke="#ff6622" stroke-width="2"/>
  <line x1="960" y1="447" x2="843" y2="366" stroke="#ff6622" stroke-width="2"/>

  <!-- ═══════════════════════════════════
       BATTERY  (bottom center)
  ══════════════════════════════════════ -->
  <rect x="380" y="590" width="230" height="75" rx="8" fill="url(#batGrad)" stroke="#44ff44" stroke-width="2.5" filter="url(#glow)"/>
  <text x="495" y="612" fill="#88ff88" font-size="13" font-weight="bold" text-anchor="middle">🔋 LiPo Battery</text>
  <text x="495" y="630" fill="#aaffaa" font-size="10" text-anchor="middle">11.1V  3S  •  XT60 Connector</text>
  <text x="495" y="648" fill="#55ff55" font-size="9" text-anchor="middle">→ Driver A VCC  +  Driver B VCC</text>
  <text x="495" y="662" fill="#55ff55" font-size="9" text-anchor="middle">→ Buck Converter IN</text>

  <!-- Battery power lines to drivers -->
  <line x1="400" y1="592" x2="160" y2="314" stroke="#44ff44" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
  <line x1="590" y1="592" x2="843" y2="314" stroke="#44ff44" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>

  <!-- ═══════════════════════════════════
       BUCK CONVERTER  (bottom right)
  ══════════════════════════════════════ -->
  <rect x="680" y="590" width="170" height="75" rx="7" fill="#1a1100" stroke="#ffdd00" stroke-width="2"/>
  <text x="765" y="612" fill="#ffee44" font-size="11" font-weight="bold" text-anchor="middle">Buck Converter</text>
  <text x="765" y="628" fill="#ffcc44" font-size="9" text-anchor="middle">DC-DC 10A Step-Down</text>
  <text x="765" y="644" fill="#ffaa44" font-size="9" text-anchor="middle">11.1V  →  5V</text>
  <text x="765" y="660" fill="#ffaa44" font-size="9" text-anchor="middle">→ ESP32 VIN</text>

  <!-- Buck → ESP32 -->
  <line x1="700" y1="592" x2="520" y2="428" stroke="#ffdd00" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- ═══════════════════════════════════
       Status LED
  ══════════════════════════════════════ -->
  <circle cx="620" cy="530" r="14" fill="#001100" stroke="#44ddff" stroke-width="2"/>
  <circle cx="620" cy="530" r="8" fill="#00aaff" opacity="0.7"/>
  <text x="620" y="558" fill="#44ddff" font-size="8" text-anchor="middle">LED (GPIO2)</text>
  <line x1="580" y1="460" x2="615" y2="516" stroke="#44ddff" stroke-width="1.2" stroke-dasharray="4,2"/>

  <!-- ═══════════════════════════════════
       DABBLE / PHONE
  ══════════════════════════════════════ -->
  <rect x="30" y="590" width="150" height="90" rx="10" fill="#0a001a" stroke="#aa44ff" stroke-width="2"/>
  <rect x="40" y="598" width="130" height="74" rx="6" fill="#111133"/>
  <text x="105" y="622" fill="#cc88ff" font-size="10" font-weight="bold" text-anchor="middle">📱 Dabble App</text>
  <text x="105" y="638" fill="#aa66ff" font-size="8" text-anchor="middle">GamePad Module</text>
  <text x="105" y="652" fill="#8855cc" font-size="8" text-anchor="middle">Bluetooth BLE</text>
  <text x="105" y="666" fill="#6644aa" font-size="8" text-anchor="middle">→ ESP32 "ZAGREX"</text>

  <!-- BT wave lines -->
  <path d="M 180 635 Q 260 620 350 500 Q 390 460 420 420" stroke="#aa44ff" stroke-width="1.5" fill="none" stroke-dasharray="6,4" opacity="0.6"/>

  <!-- ═══════════════════════════════════
       LEGEND
  ══════════════════════════════════════ -->
  <rect x="20" y="510" width="330" height="60" rx="5" fill="#0a0a1e" stroke="#333366" stroke-width="1"/>
  <text x="30" y="528" fill="#aaaaff" font-size="10" font-weight="bold">LEGEND</text>
  <line x1="30" y1="539" x2="58" y2="539" stroke="#88ff88" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="63" y="543" fill="#cccccc" font-size="9">Left Driver Control Signals</text>
  <line x1="30" y1="555" x2="58" y2="555" stroke="#ffaa66" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="63" y="559" fill="#cccccc" font-size="9">Right Driver Control Signals</text>
  <line x1="180" y1="539" x2="208" y2="539" stroke="#ffaa00" stroke-width="2"/>
  <text x="213" y="543" fill="#cccccc" font-size="9">Motor Output Wires</text>
  <line x1="180" y1="555" x2="208" y2="555" stroke="#44ff44" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="213" y="559" fill="#cccccc" font-size="9">Battery Power Lines (11.1V)</text>

  <!-- Corner decoration -->
  <text x="1080" y="770" fill="#222244" font-size="8" text-anchor="end">ZAGREX · AUK ETE 2025</text>
</svg>
